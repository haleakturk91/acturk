<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACTurk</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background: linear-gradient(135deg,#1e3c72,#2a5298);
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            text-align:center;
            padding:20px;
        }

        .container{
            max-width:700px;
        }

        h1{
            font-size:3rem;
            margin-bottom:20px;
        }

        p{
            font-size:1.2rem;
            opacity:0.9;
            line-height:1.7;
            margin-bottom:30px;
        }

        .btn{
            display:inline-block;
            text-decoration:none;
            background:white;
            color:#2a5298;
            padding:14px 28px;
            border-radius:12px;
            font-weight:bold;
            transition:0.3s;
        }

        .btn:hover{
            transform:translateY(-3px);
            box-shadow:0 10px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Merhaba</h1>

        <p>
            Bu site ACTurk geliştiricisi tarafından yayınlanacak uygulamaların tanıtımı amaçlı olarak hazırlanmıştır.
			
			Dream Map: Rüya Günlüğü: Rüyaların yapay zeka destekli olarak tabirinin yapılması ve görselleştirmesini sağlar. Ayrıca rüyalarınızın geçmişini tutarak bir günlük mantığı sağlar.
        </p>
    </div>

</body>
</html>
